name: DDizi M3U Scraper Worker

on:
  schedule:
    # Her gün gece saat 03:00'te (UTC) otomatik çalışır
    - cron: '0 3 * * *'
  workflow_dispatch:
    # GitHub üzerinden manuel tetikleme butonu ekler

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install httpx selectolax pyyaml

      - name: DDizi Scraper'ı Çalıştır
        run: python main.py

      - name: Yeni M3U ve JSON Dosyalarını Repoya Yükle
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          # Eğer değişiklik yoksa hata vermemesi için || true ekliyoruz
          git commit -m "bot: M3U ve JSON listeleri güncellendi" || true
          git push
plugin:
  name: "DDizi"
  language: "tr"
  main_url: "https://www.ddizi.im"

settings:
  timeout: 15
  output_dir: "./outputs"

targets:
  # JSON ve M3U'ya dönüştürülmesini istediğin dizi linklerini buraya ekle
  - "https://www.ddizi.im/dizi/ornek-dizi-linki"
