name: Spor Verilerini Guncelle

on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir çalışır
  workflow_dispatch: # İstersen GitHub üzerinden manuel de tetikleyebilirsin

permissions:
  contents: write # Repoya db.json dosyasını yazabilmesi için GEREKLİ İZİN

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Gerekli Kütüphaneleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Python Scriptini Çalıştır (JSON Üret)
        run: python scraper1.py

      - name: Yeni Verileri Commit Et ve Pushla
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SporZeka Bot"
          git add data/db.json
          # Eğer değişiklik yoksa hata vermemesi için exit 0 ekliyoruz
          git commit -m "⚡ Otomatik Spor Verisi Güncellemesi" || exit 0
          git push